name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Generate release calendars
        run: python -m anime_calendar

      - name: Verify calendar outputs
        shell: bash
        run: |
          files=(
            anime_calendar.ics
            all_releases.ics
            episodes.ics
            movies.ics
            specials.ics
            streaming_confirmed.ics
            crunchyroll.ics
            hidive.ics
            confirmed_releases.ics
            reported_releases.ics
            estimated_releases.ics
          )
          for file in "${files[@]}"; do
            test -f "output/$file"
            grep -q "BEGIN:VCALENDAR" "output/$file"
            grep -q "END:VCALENDAR" "output/$file"
          done
          echo "All calendar feeds generated successfully."
          echo "All releases: $(grep -c 'BEGIN:VEVENT' output/all_releases.ics || true)"
          echo "Crunchyroll: $(grep -c 'BEGIN:VEVENT' output/crunchyroll.ics || true)"
          echo "HIDIVE: $(grep -c 'BEGIN:VEVENT' output/hidive.ics || true)"
          echo "Confirmed dates: $(grep -c 'BEGIN:VEVENT' output/confirmed_releases.ics || true)"
          echo "Reported dates: $(grep -c 'BEGIN:VEVENT' output/reported_releases.ics || true)"
          echo "Estimated dates: $(grep -c 'BEGIN:VEVENT' output/estimated_releases.ics || true)"

      - name: Upload generated calendars
        uses: actions/upload-artifact@v7
        with:
          name: anime-release-calendars-${{ github.sha }}
          path: output/*.ics
          if-no-files-found: error
          retention-days: 14
