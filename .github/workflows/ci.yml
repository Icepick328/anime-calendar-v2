name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Generate release calendars
        run: python -m anime_calendar

      - name: Verify calendar outputs
        shell: bash
        run: |
          for file in anime_calendar.ics all_releases.ics episodes.ics movies.ics specials.ics; do
            test -f "output/$file"
            grep -q "BEGIN:VCALENDAR" "output/$file"
            grep -q "END:VCALENDAR" "output/$file"
          done
          echo "All calendar feeds generated successfully."
          echo "All releases: $(grep -c 'BEGIN:VEVENT' output/all_releases.ics)"
          echo "Episodes: $(grep -c 'BEGIN:VEVENT' output/episodes.ics)"
          echo "Movies: $(grep -c 'BEGIN:VEVENT' output/movies.ics)"
          echo "Specials: $(grep -c 'BEGIN:VEVENT' output/specials.ics)"

      - name: Upload generated calendars
        uses: actions/upload-artifact@v7
        with:
          name: anime-release-calendars-${{ github.sha }}
          path: output/*.ics
          if-no-files-found: error
          retention-days: 14
